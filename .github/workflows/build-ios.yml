name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Generate iOS project
      run: |
        rm -rf ios/
        flutter create --platforms=ios .
        
    - name: Setup CocoaPods
      run: |
        sudo gem install cocoapods
        cd ios
        pod install --repo-update
        
    - name: Build iOS with auto-signing
      run: |
        flutter config --no-enable-swift-package-manager
        flutter build ios --simulator --no-codesign
        
    - name: Re-sign IPA for device installation
      run: |
        cd build/ios/iphonesimulator
        mkdir -p Payload
        cp -r Runner.app Payload/
        /usr/libexec/PlistBuddy -c "Delete :UISupportedDevices" Payload/Runner.app/Info.plist 2>/dev/null || true
        zip -r app.ipa Payload
        
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: ios-unsigned-ipa
        path: build/ios/iphonesimulator/app.ipa
        retention-days: 30
