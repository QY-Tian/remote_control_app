name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Generate iOS project
      run: |
        rm -rf ios/
        flutter create --platforms=ios .
        
    - name: Setup CocoaPods
      run: |
        sudo gem install cocoapods
        cd ios
        pod install --repo-update
        
    - name: Disable code signing
      run: |
        cd ios
        sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' Runner.xcodeproj/project.pbxproj
        sed -i '' 's/DEVELOPMENT_TEAM = ""/DEVELOPMENT_TEAM = "XXXXXXXXXX"/g' Runner.xcodeproj/project.pbxproj
        
    - name: Build iOS for device (no codesign)
      run: |
        flutter config --no-enable-swift-package-manager
        flutter build ios --release --no-codesign
      
    - name: Create IPA
      run: |
        cd build/ios/iphoneos
        mkdir -p Payload
        cp -r Runner.app Payload/
        zip -r app.ipa Payload
        
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: ios-release-ipa
        path: build/ios/iphoneos/app.ipa
        retention-days: 30
