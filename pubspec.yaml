name: remote_control_app
description: A cross-platform remote control app - iOS controls Android

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # WebRTC for real-time communication
  flutter_webrtc: ^0.10.4
  
  # State management
  provider: ^6.1.1
  
  # Shared preferences for local storage
  shared_preferences: ^2.2.2
  
  # UUID generation
  uuid: ^4.2.1
  
  # Permission handler
  permission_handler: ^11.1.0
  
  # Device info
  device_info_plus: ^9.1.2
  
  # Network info
  network_info_plus: ^4.0.2
  
  # Firebase (免费信令服务器，无需自建)
  firebase_core: ^2.24.2
  firebase_database: ^10.4.0
  
  # Screen keep awake
  wakelock_plus: ^1.1.4
  
  # Path provider
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
